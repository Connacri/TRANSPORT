name: Build & Release Cargoza

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  # ═══════════════════════════════════════════
  # JOB 0 – Extraire la version
  # ═══════════════════════════════════════════
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      version_full: ${{ steps.ver.outputs.version_full }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extraire la base de version depuis pubspec.yaml
        id: ver
        run: |
          # Extrait le Major.Minor (ex: 1.0)
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'.' -f1,2 | tr -d '[:space:]')
          VERSION_FULL="${BASE_VERSION}.${{ github.run_number }}"
          TAG="v${VERSION_FULL}"
          echo "version_base=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "version_full=${VERSION_FULL}"  >> $GITHUB_OUTPUT
          echo "tag=${TAG}"                    >> $GITHUB_OUTPUT
          echo "▶ BASE_VERSION = ${BASE_VERSION}"
          echo "▶ VERSION_FULL = ${VERSION_FULL}"
          echo "▶ TAG          = ${TAG}"

  # ═══════════════════════════════════════════
  # JOB 1 – Tests & Analyse
  # ═══════════════════════════════════════════
  test:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ═══════════════════════════════════════════
  # JOB 2 – Build Android APK
  # ═══════════════════════════════════════════
  build-android:
    needs: [extract-version, test]
    runs-on: ubuntu-latest
    env:
      VERSION_FULL: ${{ needs.extract-version.outputs.version_full }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Créer key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../transport.jks" >> android/key.properties

      - name: Build APK release
        run: |
          flutter build apk --release \
            --build-name="${VERSION_FULL}" \
            --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: cargoza_android
          path: build/app/outputs/flutter-apk/app-release.apk

  # ═══════════════════════════════════════════
  # JOB 3 – Build Windows + Inno Setup
  # ═══════════════════════════════════════════
  build-windows:
    needs: [extract-version, test]
    runs-on: windows-latest
    env:
      VERSION_FULL: ${{ needs.extract-version.outputs.version_full }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Patcher pubspec & setup.iss
        shell: pwsh
        run: |
          $versionFull = "$env:VERSION_FULL"
          $buildNumber = "${{ github.run_number }}"

          # pubspec.yaml - format: 1.0.X+X
          (Get-Content pubspec.yaml) -replace '^version: .*', "version: $versionFull+$buildNumber" | Set-Content pubspec.yaml
          
          # installer/setup.iss
          if (Test-Path installer/setup.iss) {
            (Get-Content installer/setup.iss) -replace '#define AppVersion "[^"]*"', "#define AppVersion `"$versionFull`"" | Set-Content installer/setup.iss
          }

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Installer Inno Setup
        run: choco install innosetup -y

      - name: Build installeur .exe
        run: iscc installer/setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: cargoza_windows
          path: installer/output/*.exe

  # ═══════════════════════════════════════════
  # JOB 4 – Release GitHub & Assets Update
  # ═══════════════════════════════════════════
  release:
    needs: [extract-version, build-android, build-windows]
    runs-on: ubuntu-latest
    env:
      VERSION_FULL: ${{ needs.extract-version.outputs.version_full }}
      TAG:          ${{ needs.extract-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: cargoza_android
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: cargoza_windows
          path: dist/

      - name: Renommer les fichiers
        run: |
          mv dist/app-release.apk dist/Cargoza_v${{ env.VERSION_FULL }}.apk
          find dist/ -name "*.exe" -exec mv {} dist/Cargoza_v${{ env.VERSION_FULL }}_Installer.exe \;

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Cargoza v${{ env.VERSION_FULL }}"
          body: |
            ## 🚀 Cargoza - Release ${{ env.VERSION_FULL }}
            
            ### 📥 Téléchargement
            - 🤖 **Android** : [Cargoza_v${{ env.VERSION_FULL }}.apk](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.TAG }}/Cargoza_v${{ env.VERSION_FULL }}.apk)
            - 🪟 **Windows** : [Cargoza_v${{ env.VERSION_FULL }}_Installer.exe](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.TAG }}/Cargoza_v${{ env.VERSION_FULL }}_Installer.exe)
            
            ---
            *Généré automatiquement par GitHub Actions.*
          files: |
            dist/*.apk
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mettre à jour pubspec.yaml (master)
        run: |
          VERSION_FULL=${{ needs.extract-version.outputs.version_full }}
          BUILD_NUMBER=${{ github.run_number }}
          sed -i "s/^version: .*/version: ${VERSION_FULL}+${BUILD_NUMBER}/" pubspec.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${VERSION_FULL} [skip ci]" || echo "No changes to commit"
          git push origin master
