name: transport_hub
description: Application multiservice de transport — TransportHub
publish_to: 'none'
version: 1.0.0+46

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── FIREBASE (Auth + FCM uniquement) ───────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.3.0
  firebase_messaging: ^15.1.3

  # ─── SUPABASE (DB + Storage + Realtime) ─────────────────────
  supabase_flutter: ^2.6.0

  # ─── STATE MANAGEMENT ────────────────────────────────────────
  provider: ^6.1.2

  # ─── NAVIGATION ──────────────────────────────────────────────
  go_router: ^14.3.0

  # ─── MAPS OSM ────────────────────────────────────────────────
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_cancellable_tile_provider: ^3.0.0

  # ─── LOCALISATION ────────────────────────────────────────────
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # ─── BACKGROUND SERVICE (tracking Uber/Yassir) ───────────────
  flutter_background_service: ^5.0.5

  # ─── NOTIFICATIONS ───────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ─── IMAGES ──────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # ─── HTTP ────────────────────────────────────────────────────
  http: ^1.2.2
  dio: ^5.7.0

  # ─── STOCKAGE LOCAL ──────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ─── UTILITAIRES ─────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  qr_flutter: ^4.1.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  package_info_plus: ^8.1.0

  # ─── UI COMPONENTS ───────────────────────────────────────────
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  gap: ^3.0.1
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  timeline_tile: ^2.0.0
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icons/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/icon.png

  android_12:
    image: assets/icons/icon.png
    color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/icons/icon.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
